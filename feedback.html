<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feedback</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .wrap{max-width:1100px;margin:0 auto}

    /* ===== Banner: make it tiny (only the back button) ===== */
    .site-header{min-height:auto !important}
    .site-header .container{
      padding-top:10px !important;
      padding-bottom:10px !important;
    }
    /* remove any extra spacing from global header styles */
    .header-row{padding:0 !important; margin:0 !important}

    .back-row{display:flex;align-items:center;margin:0}
    .back-home{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 10px;border:1px solid var(--line);border-radius:999px;
      background:#fff;color:#0ea5e9;text-decoration:none;font-size:14px;
    }
    .back-home:hover{background:#f0f9ff}
    .back-home .chev{font-size:16px;line-height:1}

    /* ===== Embed card ===== */
    .form-card{padding:0; overflow:hidden}
    .form-embed{
      width:100%;
      height:90vh;
      min-height:860px;
      border:0;
      display:block;
      background:#fff;
    }
    .helper{
      padding:10px 14px 12px;
      border-top:1px solid var(--line);
      background:#fff;
      color:#6b7280;
      font-size:13px;
    }
  </style>
  <script data-goatcounter="https://thermofluidlearn.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>
  <script defer src="analytics.js"></script>
</head>

<body>
  <!-- Banner only shows back button -->
  <header class="site-header">
    <div class="container wrap">
      <div class="back-row">
        <a class="back-home" href="./index.html" aria-label="Back to home">
          <span class="chev">←</span> Home
        </a>
      </div>
    </div>
  </header>

  <main class="container wrap">
    <section class="card form-card">
      <iframe
        id="msFormFrame"
        class="form-embed"
        title="Feedback (Microsoft Form)"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        allow="fullscreen"
        src=""
      ></iframe>

      <div class="helper">
        If the embedded form doesn’t load properly in your browser, open it directly:
        <a id="directLink" href="#" target="_blank" rel="noopener">Microsoft Form link</a>.
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container wrap">
      <p>&copy; <span id="year"></span> UIUC • Prof. Tang • Interactive Tools</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ====== Microsoft Forms base URL ======
    const BASE_FORM_URL =
      "https://forms.office.com/Pages/ResponsePage.aspx?id=b35GRCxGok6CP3gA3lQ04z3-gWze26lJrPNAvD0xDLlURUU5MVNHTkJWTVRSRUlMVTdRWFRIUElBSS4u";

    // Prefill field keys (from your NEW prefilled link)
    const FIELD_SIM   = "re20f1bdb957a4eb4986d7efe2381522d"; // Simulation/page
    const FIELD_MSG   = "ra084e24b4c2d4708a82b7856269dde83"; // feedback input (leave blank)
    const FIELD_NAME  = "r1fb27696bf4a4904938055d6cb47073f"; // name/contact (leave blank)

    function readContext(){
      const qs = new URLSearchParams(location.search);
      let sim = (qs.get("sim") || "").trim();

      if(!sim){
        try{
          const ctx = JSON.parse(localStorage.getItem("fb_ctx") || "{}");
          sim = (ctx.sim || "").trim();
        }catch{}
      }

      // If opened from index/home context, do NOT prefill "Home"
      if(sim.toLowerCase() === "home") sim = "";

      return { sim };
    }

    // Force percent-encoding so spaces become %20 (not "+")
    function encodeStrict(s){
      return encodeURIComponent(s).replace(/%20/g, '%20');
    }

    function buildUrl({ sim }){
      const u = new URL(BASE_FORM_URL);

      // Only prefill simulation/page if we actually have one
      if(sim){
        // URLSearchParams will often render spaces as '+'. We override by setting manually.
        // Build a clean query string using encodeURIComponent (spaces -> %20).
        // We'll do it by constructing the final string ourselves.
        const base = u.toString();
        const q = `${FIELD_SIM}=${encodeURIComponent(sim)}`;
        return `${base}&${q}`;
      }

      return u.toString();
    }

    (function init(){
      const { sim } = readContext();

      // Build URL (only includes sim when present)
      const finalUrl = buildUrl({ sim });

      document.getElementById("msFormFrame").src = finalUrl;
      document.getElementById("directLink").href = finalUrl;
    })();
  </script>
</body>
</html>
