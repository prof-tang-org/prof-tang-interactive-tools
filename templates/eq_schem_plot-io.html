<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="../templates/temp-styles.css" />
  <script>window.MathJax={chtml:{scale:0.9},options:{renderActions:{addMenu:[]}}}</script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script data-goatcounter="https://thermofluidlearn.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>
  <script defer src="../analytics.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-row">
        <h1 id="header-title"></h1>
        <a class="btn primary feedback-link" href="../feedback.html" target="_blank" rel="noopener">Send feedback</a>
      </div>
    </div>
  </header>

  <main class="container">
    <nav class="back-row">
      <a href="../index.html" class="back-home" aria-label=""><span class="chev">←</span> Home</a>
    </nav>

    <section class="grid">
      <div class="card">
        <!-- Adds class="eq-schem" here if schematic enabled -->
        <div id="eqschem-container">
          <div id="equation-container"> 

          </div>
          <!-- Schematic hidden unless enabled -->
          <div class="card float hidden" id="schematic-card-container">
            <h3>Schematic</h3>
            <div class="dark-card schem" id="schematic-image-container" aria-label="Schematic">
              <img src="" alt="">
            </div>
          </div>
        </div>
        
        <!-- Plot -->
        <div>
          <h3>Plots</h3>
          <svg id="plot" viewBox="0 0 760 320" aria-label="Plots"></svg>
          <div class="note" id="plot-note"></div>
        </div>
      </div>

      <div class="card float">
        <h3>Inputs & Outputs</h3>

        <div class="value-group hidden" id="fixed-inputs">
        </div>

        <div id="controls">
        </div>

        <div>
          <label></label>
          <div class="value-group" id="outputs">
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="../index.html" class="back-home"><span class="chev">←</span> Home</a>
    </div>
  </footer>

  <script src="../templates/renderer.js"></script>
</body>
</html>
