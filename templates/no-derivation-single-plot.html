<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./temp-styles.css" />
  <script>window.MathJax={chtml:{scale:0.9},options:{renderActions:{addMenu:[]}}}</script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script data-goatcounter="https://thermofluidlearn.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>
  <script defer src="../analytics.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-row">
        <h1></h1>
        <a class="btn primary feedback-link" href="../feedback.html" target="_blank" rel="noopener">Send feedback</a>
      </div>
    </div>
  </header>

  <main class="container">
    <nav class="back-row">
      <a href="../index.html" class="back-home" aria-label=""><span class="chev">←</span> Home</a>
    </nav>

    <section class="top-grid">
      <div class="ctl">
        <div class="eq-schem">
          <div class="eqwrap">
            <div class="note title-xl"><b></b></div>

            <div class="eqbig">
            </div>

            <div class="note"><b></b>
              <ul>
                <li><b></b></li>
              </ul>
            </div>
          </div>

          <div class="schem" aria-label="">
            <img src="" alt="">
          </div>
        </div>

        <div class="viz">
          <svg id="plot" viewBox="0 0 760 320" aria-label=""></svg>
        </div>
      </div>

      <div class="ctl">
        <div class="controls">
          <div>
            <label></label>
            <select id="">
              <option value="" selected></option>
            </select>
            <div class="note"></div>
          </div>

          <div class="rowflex">
            <div>
              <label></label>
              <input id="" class="num-sm" type="number" step="" min="" value="" />
            </div>
            <div>
              <label></label>
              <div class="inline">
                <input id="" class="num-sm" type="number" step="" min="" value="" />
                <select id="" aria-label="">
                  <option value="" selected></option>
                </select>
              </div>
              <input id="" type="range" min="" max="" step="" value="">
              <div class="note"></div>
            </div>
          </div>

          <div>
            <label></label>
            <div class="kpi">
              <div><div class="lab"></div><div id="" class="val"></div></div>
              <div><div class="lab"></div><div id="" class="val"></div></div>
              <div><div class="lab"></div><div id="" class="val"></div></div>
            </div>
          </div>

          <p class="note"></p>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="note"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="../index.html" class="back-home"><span class="chev"></span></a>
    </div>
  </footer>
</body>
</html>
